<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 中药材管理系统</title>
    <!-- 国内CDN资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 添加动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- 配置Tailwind自定义颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D6A4F',    // 中药主题绿色
                        secondary: '#74C69D',  // 浅绿色
                        accent: '#D8F3DC',     // 淡绿色背景
                        danger: '#E63946',     // 错误提示红色
                        success: '#4CAF50',    // 成功提示绿色
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- 自定义工具类 -->
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .form-focus {
                @apply focus:ring-2 focus:ring-primary/50 focus:border-primary focus:outline-none;
            }
            .card-shadow {
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            }
            .btn-hover {
                @apply transform transition-all duration-300 hover:scale-[1.02] hover:shadow-lg;
            }
            .input-focus {
                @apply transition-all duration-300;
            }
            .input-focus:focus {
                @apply scale-[1.02] shadow-md;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-accent to-white min-h-screen flex flex-col">
<!-- 顶部装饰 -->
<div class="h-2 bg-primary"></div>

<!-- 主要内容区域 -->
<main class="flex-grow flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
        <!-- 注册卡片 -->
        <div class="bg-white rounded-2xl p-8 card-shadow animate__animated animate__fadeInUp">
            <!-- 系统Logo和标题 -->
            <div class="text-center mb-8 animate__animated animate__fadeInDown">
                <div class="w-20 h-20 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg animate__animated animate__pulse animate__slower animate__infinite">
                    <i class="fas fa-user-plus text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">账号注册</h1>
                <p class="text-gray-500">创建新账号以使用中药材管理系统</p>
            </div>

            <!-- 注册表单 -->
            <form action="/registercommit" method="post" class="space-y-6" id="registerForm">
                <!-- 用户名输入 -->
                <div class="space-y-2">
                    <label for="username" class="block text-sm font-medium text-gray-700">
                        <i class="fas fa-user text-primary mr-1"></i>用户名 <span class="text-red-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input
                                type="text"
                                id="username"
                                name="username"
                                placeholder="请输入用户名"
                                class="w-full pl-10 px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                                required
                        >
                    </div>
                </div>

                <!-- 密码输入 -->
                <div class="space-y-2">
                    <label for="password" class="block text-sm font-medium text-gray-700">
                        <i class="fas fa-lock text-primary mr-1"></i>密码 <span class="text-red-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="请输入密码（至少6位）"
                                class="w-full pl-10 px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                                required
                                minlength="6"
                        >
                        <button
                                type="button"
                                class="toggle-password absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-primary transition-colors"
                                data-target="password"
                        >
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <!-- 确认密码输入 -->
                <div class="space-y-2">
                    <label for="repassword" class="block text-sm font-medium text-gray-700">
                        <i class="fas fa-lock-open text-primary mr-1"></i>确认密码 <span class="text-red-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock-open text-gray-400"></i>
                        </div>
                        <input
                                type="password"
                                id="repassword"
                                name="repassword"
                                placeholder="请再次输入密码"
                                class="w-full pl-10 px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                                required
                        >
                        <button
                                type="button"
                                class="toggle-password absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-primary transition-colors"
                                data-target="repassword"
                        >
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                    <p id="passwordMatch" class="text-xs hidden mt-1 animate__animated animate__fadeIn"></p>
                </div>

                <!-- 邮箱输入 -->
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-medium text-gray-700">
                        <i class="fas fa-envelope text-primary mr-1"></i>邮箱 <span class="text-red-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="请输入邮箱地址"
                                class="w-full pl-10 px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                                required
                        >
                    </div>
                </div>

                <!-- 手机号输入 -->
                <div class="space-y-2">
                    <label for="phone" class="block text-sm font-medium text-gray-700">
                        <i class="fas fa-phone text-primary mr-1"></i>手机号 <span class="text-red-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-phone text-gray-400"></i>
                        </div>
                        <input
                                type="tel"
                                id="phone"
                                name="phone"
                                placeholder="请输入手机号码"
                                class="w-full pl-10 px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                                required
                                pattern="1[3-9]\d{9}"
                        >
                    </div>
                </div>

                <!-- 注册按钮 -->
                <button
                        type="submit"
                        class="w-full bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white font-medium py-3 px-4 rounded-lg btn-hover shadow-lg transform transition-all duration-300 hover:scale-[1.02] hover:shadow-xl"
                        id="submitBtn"
                        disabled
                >
                    <i class="fas fa-user-check mr-2 animate__animated animate__pulse"></i>完成注册
                </button>
            </form>

            <!-- 登录链接 -->
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    已有账号？
                    <a href="/login" class="text-primary hover:text-primary/80 font-medium transition-colors">
                        <i class="fas fa-sign-in-alt mr-1"></i>立即登录
                    </a>
                </p>
            </div>
        </div>

        <!-- 底部版权信息 -->
        <div class="mt-8 text-center text-gray-500 text-sm">
            <p>&copy; 2025 中药材管理系统 - 保护传统中医药文化</p>
        </div>
    </div>
</main>

<!-- 交互脚本 -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 获取DOM元素
        const passwordInput = document.getElementById('password');
        const repasswordInput = document.getElementById('repassword');
        const passwordMatch = document.getElementById('passwordMatch');
        const submitBtn = document.getElementById('submitBtn');
        const toggleButtons = document.querySelectorAll('.toggle-password');
        const registerForm = document.getElementById('registerForm');

        // 密码显示/隐藏切换
        toggleButtons.forEach(button => {
            button.addEventListener('click', () => {
                const targetId = button.getAttribute('data-target');
                const targetInput = document.getElementById(targetId);

                // 切换密码可见性
                const type = targetInput.getAttribute('type') === 'password' ? 'text' : 'password';
                targetInput.setAttribute('type', type);

                // 切换图标
                const icon = button.querySelector('i');
                if (type === 'password') {
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        });

        // 密码验证功能
        function validatePasswords() {
            const password = passwordInput.value;
            const repassword = repasswordInput.value;

            if (password && repassword) {
                passwordMatch.classList.remove('hidden');

                if (password === repassword) {
                    // 密码匹配
                    passwordMatch.textContent = '密码匹配';
                    passwordMatch.classList.remove('text-danger', 'text-red-500');
                    passwordMatch.classList.add('text-success', 'text-green-600');
                    repasswordInput.classList.remove('border-danger', 'border-red-500');
                    repasswordInput.classList.add('border-success', 'border-green-500');
                    submitBtn.removeAttribute('disabled');
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {
                    // 密码不匹配
                    passwordMatch.textContent = '两次输入的密码不匹配';
                    passwordMatch.classList.remove('text-success', 'text-green-600');
                    passwordMatch.classList.add('text-danger', 'text-red-500');
                    repasswordInput.classList.remove('border-success', 'border-green-500');
                    repasswordInput.classList.add('border-danger', 'border-red-500');
                    submitBtn.setAttribute('disabled', 'true');
                    submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            } else {
                passwordMatch.classList.add('hidden');
                repasswordInput.classList.remove('border-danger', 'border-red-500', 'border-success', 'border-green-500');
                submitBtn.setAttribute('disabled', 'true');
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        // 监听密码输入变化
        passwordInput.addEventListener('input', validatePasswords);
        repasswordInput.addEventListener('input', validatePasswords);

        // 表单提交前再次验证
        registerForm.addEventListener('submit', (e) => {
            if (passwordInput.value !== repasswordInput.value) {
                e.preventDefault();
                alert('两次输入的密码不匹配，请重新输入');
                repasswordInput.focus();
            }
        });

        // 输入框焦点动画效果
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.02]');
                input.parentElement.style.transition = 'transform 0.2s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.02]');
            });
        });
    });
</script>
</body>
</html>
