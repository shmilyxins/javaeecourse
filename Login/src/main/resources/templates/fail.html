<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录失败 - 中药材管理系统</title>
    <!-- 国内CDN资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 添加动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- 配置Tailwind自定义颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D6A4F',    // 中药主题绿色
                        secondary: '#74C69D',  // 浅绿色
                        accent: '#D8F3DC',     // 淡绿色背景
                        danger: '#E63946',     // 错误提示红色
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- 自定义工具类 -->
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            }
            .btn-hover {
                @apply transform transition-all duration-300 hover:scale-[1.02] hover:shadow-lg;
            }
            .btn-focus {
                @apply transition-all duration-300;
            }
            .btn-focus:hover {
                @apply scale-[1.05] shadow-lg;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-accent to-white min-h-screen flex flex-col">
<!-- 顶部装饰 -->
<div class="h-2 bg-primary"></div>

<!-- 主要内容区域 -->
<main class="flex-grow flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md">
        <!-- 错误提示卡片 -->
        <div class="bg-white rounded-2xl p-8 text-center card-shadow transform transition-all duration-500 animate__animated animate__fadeInUp">
            <!-- 错误图标 -->
            <div class="w-24 h-24 bg-danger/10 rounded-full flex items-center justify-center mx-auto mb-6 animate__animated animate__shakeX animate__delay-1s">
                <i class="fas fa-exclamation-triangle text-4xl text-danger"></i>
            </div>

            <!-- 错误信息 -->
            <h1 class="text-3xl font-bold text-gray-800 mb-4 animate__animated animate__fadeIn">登录失败</h1>
            <p class="text-gray-600 mb-8 animate__animated animate__fadeIn animate__delay-1s">
                用户名或密码不正确，请重新尝试登录
            </p>

            <!-- 操作按钮 -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a
                        href="/login"
                        class="bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white font-medium py-3 px-6 rounded-lg btn-hover btn-focus flex items-center justify-center shadow-lg"
                >
                    <i class="fas fa-sign-in-alt mr-2 animate__animated animate__pulse"></i>返回登录页
                </a>
                <a
                        href="/register"
                        class="border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 px-6 rounded-lg transition-colors btn-focus flex items-center justify-center shadow"
                >
                    <i class="fas fa-user-plus mr-2"></i>注册新账号
                </a>
            </div>
        </div>
    </div>
</main>

<!-- 页脚 -->
<footer class="bg-gray-800 text-white py-6 mt-auto">
    <div class="container mx-auto px-4 text-center">
        <p class="text-gray-400 text-sm">
            &copy; 2023 中药材管理系统 - 保护传统中医药文化
        </p>
    </div>
</footer>

<!-- 简单动画效果 -->
<script>
    // 添加页面载入动画
    document.addEventListener('DOMContentLoaded', () => {
        const card = document.querySelector('.card-shadow');
        card.style.opacity = '0';
        card.style.transform = 'translateY(20px)';

        setTimeout(() => {
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
        }, 100);
    });
</script>
    
<!-- 更新页脚年份 -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const yearSpan = document.querySelector('.text-gray-400.text-sm');
        if (yearSpan) {
            yearSpan.innerHTML = yearSpan.innerHTML.replace('2023', new Date().getFullYear());
        }
    });
</script>
</body>
</html>
