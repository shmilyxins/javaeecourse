<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <!-- 国内CDN资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        accent: '#722ED1',
                        neutral: '#F5F7FA',
                        'neutral-dark': '#4E5969',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .shadow-soft {
                box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            }
            .transition-all-300 {
                transition: all 0.3s ease;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen">
<!-- 顶部导航栏 -->
<header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="container mx-auto px-4 py-4 flex flex-wrap items-center justify-between">
        <div class="flex items-center space-x-3">
            <i class="fa fa-users text-primary text-2xl"></i>
            <h1 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-gray-800">用户管理系统</h1>
        </div>

        <div class="mt-3 sm:mt-0">
            <h2 class="text-lg font-medium text-primary" th:text="'你好，'+${session.user.username}"></h2>
        </div>
    </div>
</header>

<!-- 主内容区 -->
<main class="container mx-auto px-4 py-8">
    <!-- 图片展示区 -->
    <div class="mb-8 rounded-lg overflow-hidden shadow-soft">
        <img src="01.png" alt="系统封面图" class="w-full h-48 md:h-64 object-cover transition-all duration-500 hover:scale-105">
    </div>

    <!-- 操作链接区 -->
    <div class="mb-6 flex flex-wrap gap-4">
        <a href="/addperson" class="inline-flex items-center px-5 py-2.5 bg-primary text-white rounded-lg hover:bg-primary/90 transition-all-300 shadow-sm hover:shadow">
            <i class="fa fa-plus-circle mr-2"></i>增加用户
        </a>
        <a href="/login" class="inline-flex items-center px-5 py-2.5 bg-white text-primary border border-primary rounded-lg hover:bg-primary/5 transition-all-300">
            <i class="fa fa-sign-in-alt mr-2"></i>登录页面
        </a>
    </div>

    <!-- 搜索表单 -->
    <div class="mb-8 bg-white p-5 rounded-lg shadow-soft">
        <form action="/index" method="post" class="flex flex-col sm:flex-row gap-3">
            <div class="flex-1">
                <input type="text" name="name" placeholder="请输入搜索的用户名"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all-300">
            </div>
            <button type="submit" class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary/90 transition-all-300 whitespace-nowrap">
                <i class="fa fa-search mr-2"></i>搜索
            </button>
        </form>
    </div>

    <!-- 用户列表表格 -->
    <div class="bg-white rounded-lg shadow-soft overflow-hidden">
        <div class="p-5 border-b border-gray-100">
            <h3 class="font-semibold text-lg text-gray-800">用户列表</h3>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                <tr class="bg-gray-50 text-left">
                    <th class="px-6 py-4 text-sm font-semibold text-gray-600 uppercase tracking-wider">ID</th>
                    <th class="px-6 py-4 text-sm font-semibold text-gray-600 uppercase tracking-wider">姓名</th>
                    <th class="px-6 py-4 text-sm font-semibold text-gray-600 uppercase tracking-wider">年龄</th>
                    <th class="px-6 py-4 text-sm font-semibold text-gray-600 uppercase tracking-wider">删除操作</th>
                    <th class="px-6 py-4 text-sm font-semibold text-gray-600 uppercase tracking-wider">更新操作</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="person:${personList}" class="hover:bg-gray-50 transition-all-300">
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" th:text="${person.id}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" th:text="${person.name}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" th:text="${person.age}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <a th:href="@{/deleteperson(id=${person.id})}"
                           class="text-red-500 hover:text-red-700 transition-all-300 inline-flex items-center">
                            <i class="fa fa-trash-alt mr-1"></i>删除
                        </a>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <a th:href="@{/updateperson(id=${person.id},age=${person.age},name=${person.name})}"
                           class="text-primary hover:text-primary/80 transition-all-300 inline-flex items-center">
                            <i class="fa fa-edit mr-1"></i>更新
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 空状态提示 -->
        <div th:if="${personList == null or personList.isEmpty()}" class="p-10 text-center">
            <i class="fa fa-folder-open text-gray-300 text-5xl mb-4"></i>
            <p class="text-gray-500">暂无用户数据</p>
        </div>
    </div>
</main>

<!-- 页脚 -->
<footer class="bg-white border-t border-gray-200 mt-12">
    <div class="container mx-auto px-4 py-6">
        <p class="text-center text-gray-500 text-sm">© 2023 用户管理系统 - 版权所有</p>
    </div>
</footer>

<!-- 简单的交互脚本 -->
<script>
    // 为删除链接添加确认提示
    document.querySelectorAll('a[th\\:href*="deleteperson"]').forEach(link => {
        link.addEventListener('click', function(e) {
            if(!confirm('确定要删除这条记录吗？')) {
                e.preventDefault();
            }
        });
    });

    // 页面加载动画
    document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('opacity-100');
        document.body.classList.remove('opacity-0');
    });
</script>
</body>
</html>
