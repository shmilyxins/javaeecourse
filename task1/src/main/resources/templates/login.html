<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 中药材管理系统</title>
    <!-- 国内CDN资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 添加动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- 配置Tailwind自定义颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D6A4F',    // 中药主题绿色
                        secondary: '#74C69D',  // 浅绿色
                        accent: '#D8F3DC',     // 淡绿色背景
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- 自定义工具类 -->
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .form-focus {
                @apply focus:ring-2 focus:ring-primary/50 focus:border-primary focus:outline-none;
            }
            .card-shadow {
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            }
            .input-focus {
                @apply transition-all duration-300;
            }
            .input-focus:focus {
                @apply scale-[1.02] shadow-md;
            }
            .btn-hover {
                @apply transform transition-all duration-300 hover:scale-[1.02] hover:shadow-lg;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-accent to-white min-h-screen flex flex-col">
<!-- 顶部装饰 -->
<div class="h-2 bg-primary"></div>

<!-- 主要内容区域 -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <!-- 登录卡片 -->
        <div class="bg-white rounded-2xl p-8 card-shadow animate__animated animate__fadeInUp">
            <!-- 系统Logo和标题 -->
            <div class="text-center mb-8 animate__animated animate__fadeInDown">
                <div class="w-20 h-20 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg animate__animated animate__pulse animate__slower animate__infinite">
                    <i class="fas fa-leaf text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">中药材管理系统</h1>
                <p class="text-gray-500">请登录以继续</p>
            </div>

            <!-- 登录表单 -->
            <form action="/logincommit" method="post" class="space-y-6">
                <!-- 用户名输入 -->
                <div class="space-y-2">
                    <label for="username" class="block text-sm font-medium text-gray-700">
                        <i class="fas fa-user text-primary mr-1"></i>用户名
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input
                                type="text"
                                id="username"
                                name="username"
                                placeholder="请输入用户名"
                                class="w-full pl-10 px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                                required
                        >
                    </div>
                </div>

                <!-- 密码输入 -->
                <div class="space-y-2">
                    <label for="password" class="block text-sm font-medium text-gray-700">
                        <i class="fas fa-lock text-primary mr-1"></i>密码
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="请输入密码"
                                class="w-full pl-10 px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                                required
                        >
                        <button
                                type="button"
                                id="togglePassword"
                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-primary transition-colors"
                        >
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <!-- 登录按钮 -->
                <button
                        type="submit"
                        class="w-full bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white font-medium py-3 px-4 rounded-lg btn-hover shadow-lg transform transition-all duration-300 hover:scale-[1.02] hover:shadow-xl"
                >
                    <i class="fas fa-sign-in-alt mr-2 animate__animated animate__pulse"></i>登录
                </button>
            </form>

            <!-- 注册链接 -->
            <div class="mt-6 text-center animate__animated animate__fadeInUp">
                <p class="text-gray-600">
                    还没有账号？
                    <a href="/register" class="text-primary hover:text-primary/80 font-medium transition-colors underline-offset-2 hover:underline">
                        <i class="fas fa-user-plus mr-1"></i>立即注册
                    </a>
                </p>
            </div>
        </div>

        <!-- 底部版权信息 -->
        <div class="mt-8 text-center text-gray-500 text-sm">
            <p>&copy; 2025 中药材管理系统 - 保护传统中医药文化</p>
        </div>
    </div>
</main>

<!-- 交互脚本 -->
<script>
    // 密码显示/隐藏切换
    document.addEventListener('DOMContentLoaded', () => {
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            // 切换密码可见性
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // 切换图标
            const icon = togglePassword.querySelector('i');
            if (type === 'password') {
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // 表单元素动画效果
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.02]');
                input.parentElement.style.transition = 'transform 0.2s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.02]');
            });
        });
    });
</script>
</body>
</html>
