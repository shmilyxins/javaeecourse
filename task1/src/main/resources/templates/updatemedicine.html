<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新中药材 - 中药材管理系统</title>
    <!-- 国内CDN资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 添加动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- 配置Tailwind自定义颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D6A4F',    // 中药主题绿色
                        secondary: '#74C69D',  // 浅绿色
                        accent: '#D8F3DC',     // 淡绿色背景
                        neutral: '#F8F9FA',    // 浅灰色背景
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- 自定义工具类 -->
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .form-focus {
                @apply focus:ring-2 focus:ring-primary/50 focus:border-primary focus:outline-none;
            }
            .card-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .input-focus {
                @apply transition-all duration-300;
            }
            .input-focus:focus {
                @apply scale-[1.02] shadow-md;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<!-- 顶部导航栏 -->
<header class="bg-primary text-white shadow-md">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold flex items-center">
            <i class="fas fa-leaf mr-2"></i>
            中药材管理系统
        </h1>
        <a href="/index" class="text-white hover:text-secondary transition-colors flex items-center">
            <i class="fas fa-arrow-left mr-1"></i>返回列表
        </a>
    </div>
</header>

<!-- 主要内容区域 -->
<main class="flex-grow container mx-auto px-4 py-8">
    <!-- 页面标题 -->
    <div class="mb-8 text-center animate__animated animate__fadeInDown">
        <h2 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-gray-800 flex items-center justify-center">
            <i class="fas fa-edit text-primary mr-3 animate__animated animate__pulse"></i>
            更新中药材信息
        </h2>
        <p class="text-gray-600 mt-2 max-w-2xl mx-auto animate__animated animate__fadeIn">请修改中药材信息，完成后点击更新按钮保存更改</p>
    </div>

    <!-- 表单卡片 -->
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm p-6 md:p-8 card-shadow">
        <form action="/updatemedicinecommit" method="post" class="space-y-6">
            <!-- ID字段 -->
            <div class="space-y-2">
                <label for="id" class="block text-sm font-medium text-gray-700">
                    <i class="fas fa-hashtag text-primary mr-1"></i>中药材ID
                </label>
                <input
                        type="text"
                        id="id"
                        name="id"
                        th:value="${medicine.id}"
                        readonly
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50 cursor-not-allowed text-gray-500 form-focus"
                >
                <p class="text-xs text-gray-500">ID为系统自动生成，不可修改</p>
            </div>

            <!-- 名称字段 -->
            <div class="space-y-2">
                <label for="title" class="block text-sm font-medium text-gray-700">
                    <i class="fas fa-tag text-primary mr-1"></i>中药材名称 <span class="text-red-500">*</span>
                </label>
                <input
                        type="text"
                        id="title"
                        name="title"
                        th:value="${medicine.title}"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                        required
                >
            </div>

            <!-- 图片地址字段 -->
            <div class="space-y-2">
                <label for="imgurl" class="block text-sm font-medium text-gray-700">
                    <i class="fas fa-image text-primary mr-1"></i>中药材图片地址 <span class="text-red-500">*</span>
                </label>
                <input
                        type="text"
                        id="imgurl"
                        name="imgurl"
                        th:value="${medicine.imgurl}"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                        required
                >
                <p class="text-xs text-gray-500">请输入有效的图片URL地址</p>
            </div>

            <!-- 介绍字段 -->
            <div class="space-y-2">
                <label for="introduction" class="block text-sm font-medium text-gray-700">
                    <i class="fas fa-info-circle text-primary mr-1"></i>中药材介绍 <span class="text-red-500">*</span>
                </label>
                <textarea
                        id="introduction"
                        name="introduction"
                        rows="4"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg form-focus transition-all"
                        required
                        th:text="${medicine.introduction}"></textarea>
                <p class="text-xs text-gray-500">请输入中药材的详细介绍信息</p>
            </div>

            <!-- 提交按钮 -->
            <div class="pt-4 flex flex-col sm:flex-row gap-4 justify-end">
                <a href="/index" class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-all duration-300 hover:scale-[1.02] text-center flex items-center justify-center">
                    <i class="fas fa-times mr-2"></i>取消
                </a>
                <button
                        type="submit"
                        class="bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white px-6 py-3 rounded-lg shadow-lg transition-all duration-300 hover:scale-[1.02] text-center flex items-center justify-center"
                >
                    <i class="fas fa-save mr-2 animate__animated animate__pulse"></i>更新中药材
                </button>
            </div>
        </form>
    </div>
</main>

<!-- 页脚 -->
<footer class="bg-gray-800 text-white py-6 mt-12">
    <div class="container mx-auto px-4 text-center">
        <p class="text-gray-400 text-sm">
            &copy; 2023 中药材管理系统 - 保护传统中医药文化
        </p>
    </div>
</footer>

<!-- 简单交互脚本 -->
<script>
    // 为表单元素添加焦点动画
    document.addEventListener('DOMContentLoaded', () => {
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.style.transition = 'transform 0.2s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    });
</script>
</body>
</html>
